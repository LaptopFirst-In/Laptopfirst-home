<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid 24-Hour Clock</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Mode Toggle Button */
        .toggle-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: #0b192c;
            border: 1px solid #1e293b;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover {
            background: #1e293b;
            border-color: #cbd5e1;
        }
        .toggle-text {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            background: linear-gradient(145deg, #ffffff, #cbd5e1, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Display Wrapper */
        .display-wrapper {
            width: 90vmin;
            height: 90vmin;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Shiny Silver Text Common Style */
        .silver-text {
            background: linear-gradient(145deg, #ffffff 5%, #e2e8f0 35%, #94a3b8 60%, #f8fafc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
        }

        /* --- ANALOG INTERFACE --- */
        .clock {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #000000;
            border: 2.5vmin solid #0b192c;
            position: absolute;
            box-shadow: 0 0 50px rgba(11, 25, 44, 0.8);
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .clock::after {
            content: '';
            position: absolute;
            width: 3%;
            height: 3%;
            border-radius: 50%;
            background: #ef4444;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .numbers-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .number {
            position: absolute;
            width: 10%;
            height: 10%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 3.5vmin;
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 20px;
            z-index: 5;
            transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 1);
        }
        .hour-hand { width: 1.2%; height: 28%; background: #f8fafc; margin-left: -0.6%; }
        .min-hand { width: 0.8%; height: 38%; background: #cbd5e1; margin-left: -0.4%; }
        .sec-hand { width: 0.4%; height: 42%; background: #ef4444; margin-left: -0.2%; border-radius: 0; transition: none; }

        /* --- DIGITAL INTERFACE --- */
        .digital-display {
            position: absolute;
            /* Uses clamp to scale fluidly up to 32% of screen width, maxing out elegantly on massive panels */
            font-size: clamp(12rem, 32vw, 35vh); 
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            white-space: nowrap;
        }
        
        /* Blinking Colon Animation */
        .colon {
            animation: blink 1s steps(2, start) infinite;
            padding: 0 0.02em;
        }
        @keyframes blink {
            to { visibility: hidden; }
        }

        /* --- INTERFACE TOGGLE STATES --- */
        .mode-digital .clock {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
        .mode-digital .digital-display {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <button class="toggle-btn" id="toggle-mode" aria-label="Toggle clock view">
        <span class="toggle-text" id="toggle-text">DIGITAL</span>
    </button>

    <div class="display-wrapper" id="display-wrapper">
        <div class="clock" id="analog-face">
            <div class="numbers-container" id="numbers"></div>
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
        </div>

        <div class="digital-display silver-text" id="digital-face">
            <span id="digital-hours">00</span>
            <span class="colon">:</span>
            <span id="digital-minutes">00</span>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('display-wrapper');
        const toggleBtn = document.getElementById('toggle-mode');
        const toggleText = document.getElementById('toggle-text');
        const numbersContainer = document.getElementById('numbers');
        
        const hourHand = document.getElementById('hour-hand');
        const minHand = document.getElementById('min-hand');
        const secHand = document.getElementById('sec-hand');
        
        const digHours = document.getElementById('digital-hours');
        const digMinutes = document.getElementById('digital-minutes');

        // Toggle UI Mode Logic
        toggleBtn.addEventListener('click', () => {
            if (wrapper.classList.contains('mode-digital')) {
                wrapper.classList.remove('mode-digital');
                toggleText.innerText = 'DIGITAL';
                placeNumbers(); 
            } else {
                wrapper.classList.add('mode-digital');
                toggleText.innerText = 'ANALOG';
            }
        });

        // Math to place 24 numbers around the circle dial
        function placeNumbers() {
            if (wrapper.classList.contains('mode-digital')) return; 
            numbersContainer.innerHTML = ''; 
            const center = numbersContainer.offsetWidth / 2;
            const placementRadius = center * 0.84;

            for (let i = 1; i <= 24; i++) {
                const numberDiv = document.createElement('div');
                numberDiv.classList.add('number', 'silver-text');
                numberDiv.innerText = i;

                const angle = (i * 15 - 90) * (Math.PI / 180); 
                const x = center + placementRadius * Math.cos(angle);
                const y = center + placementRadius * Math.sin(angle);

                numberDiv.style.left = `${x}px`;
                numberDiv.style.top = `${y}px`;
                numberDiv.style.transform = 'translate(-50%, -50%)';
                
                numbersContainer.appendChild(numberDiv);
            }
        }

        // Global Engine
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // 1. Update Analog Parameters
            const hoursDegrees = (hours * 15) + (minutes * 0.25); 
            const minutesDegrees = (minutes * 6) + (seconds * 0.1);
            const secondsDegrees = seconds * 6;

            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
            minHand.style.transform = `rotate(${minutesDegrees}deg)`;
            secHand.style.transform = `rotate(${secondsDegrees}deg)`;

            // 2. Update Digital Parameters (padded to 2 digits)
            digHours.textContent = hours.toString().padStart(2, '0');
            digMinutes.textContent = minutes.toString().padStart(2, '0');
        }

        // Initialize Systems smoothly
        document.addEventListener('DOMContentLoaded', () => {
            placeNumbers();
            updateClock();
            window.addEventListener('resize', placeNumbers);
            setInterval(updateClock, 1000);
        });

        if (document.readyState === "complete" || document.readyState === "interactive") {
            placeNumbers();
            updateClock();
        }
    </script>
</body>
</html>
